<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API DDD</title>
</head>
<body>
    <header>
        <h1>API DDD</h1>
    </header>

    <main>
        <section aria-labelledby="titulo-consulta">
            <h2 id="titulo-consulta">Consultar DDD</h2>

            <form id="formulario-ddd">
                <label for="campo-ddd">DDD</label>
                <input type="text" id="campo-ddd" name="ddd" placeholder="Ex: 11">

                <div class="btn-container">
                    <button type="submit" id="login-btn">Enviar</button>
                </div>
            </form>

            <p id="mensagem" class="msg" role="alert"></p>

            <article id="resultado"></article>

            <article id="tempo"></article>
        </section>
    </main>

    <script src="api_tempo.js"></script>
    <script src="api-ddd.js"></script>
</body>
</html>
